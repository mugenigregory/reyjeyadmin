<head>
  <title>Jeyrey Admin Login</title>
</head>


<body>

<div class="login-wrapper">

  <div class="login-card">
    <div class="logo">🛍️ Jeyrey Admin</div>
    <div class="subtitle">Secure dashboard login</div>

    <form id="loginForm">

      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />

      <button type="submit">Login</button>

    </form>

    <div class="footer">
      FXB Technology • Admin Control Panel
    </div>
  </div>

</div>


<!-- FXB INSTALL BANNER -->
<div class="fxb-banner" id="fxbBanner">
  <div class="fxb-card">

    <div class="fxb-header">
      <div class="fxb-header-left">
        <div class="fxb-icon">🛍️</div>
        <div>
          <div class="fxb-title">Install Jayrey</div>
          <div class="fxb-sub">Get full app experience</div>
        </div>
      </div>

      <div class="fxb-close" id="fxbClose">✕</div>
    </div>

    <div class="fxb-body">
      <ul class="fxb-list">
        <li>✓ Fast & offline access</li>
        <li>✓ Instant notifications</li>
        <li>✓ Better performance</li>
        <li>✓ Home screen shortcut</li>
      </ul>

      <button class="fxb-btn" id="fxbInstall">Install App</button>
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
console.log("🔥 FXB SCRIPT LOADED");

  console.log("✅ DOM READY");

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js")
        .then(() => console.log("✅ Service Worker registered"))
            .catch(err => console.log("❌ SW failed", err));
            }

  let deferredPrompt = null;

  const banner = document.getElementById("fxbBanner");

  window.addEventListener("beforeinstallprompt", (e) => {
    console.log("🚀 INSTALL EVENT FIRED");

    e.preventDefault();
    deferredPrompt = e;

    banner.style.display = "flex";
  });


  // ===============================
  // 🔐 LOGIN SYSTEM
  // ===============================
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
      // backend login
      const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
      });

      // fallback local login (prevents lockout)
      const localValid =
        username === "admin" &&
        password === "adminRay2026";

      if (response.ok || localValid) {
        sessionStorage.setItem("adminAuthenticated", "true");
        window.location.href = "/admin-panel.html";
      } else {
        alert("Invalid login");
      }

    } catch (err) {
      // offline fallback
      if (username === "admin" && password === "adminRay2026") {
        sessionStorage.setItem("adminAuthenticated", "true");
        window.location.href = "/admin-panel.html";
      } else {
        alert("Server error");
      }
    }
  });


  // ===============================
  // 📦 INSTALL BANNER
  // ===============================

  const btnInstall = document.getElementById("fxbInstall");
  const btnClose = document.getElementById("fxbClose");

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const dismissed = localStorage.getItem("fxb_install_dismissed");
    const last = dismissed ? parseInt(dismissed) : 0;

    const days = (Date.now() - last) / (1000 * 60 * 60 * 24);

    if (!dismissed || days > 7) {
      setTimeout(() => {
        banner.style.display = "flex";
      }, 3000);
    }
  });

  btnInstall?.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;

    deferredPrompt = null;
    banner.style.display = "none";
  });

  btnClose?.addEventListener("click", () => {
    banner.style.display = "none";
    localStorage.setItem("fxb_install_dismissed", Date.now().toString());
  });

});
</script>
